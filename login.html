<!DOCTYPE html>
<html lang="ar">                    
<head>    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART +249</title>
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/log.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;500&display=swap" rel="stylesheet" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
  </head>
<body>
  <!-- Stars & swirling effects -->
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>
  <div class="swirls"></div>

  <!-- Navbar -->
   
  <nav class="navbar navbar-expand-lg fixed-top navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="#">ART +249</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#main" aria-controls="main" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="main">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="#">الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link" href="#about">عنا</a></li>
          <li class="nav-item"><a class="nav-link" href="#gallery">المعرض</a></li>
          <li class="nav-item"><a class="nav-link" href="requests.html">طلبات الرسم</a></li>
          <li class="nav-item"><a class="nav-link" href="#contact">تواصل معنا</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Login Card -->
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card login-card p-4">
      <img src="img/logo.png" class="text-center mb-4 mx-auto" alt="Logo" style="width: 200px;">
      <form action="home.html">
        <div class="input-group mb-3 position-relative">
          <span class="input-group-text bg-transparent text-light border-0 width-auto">
            <i class="fa-solid fa-user"></i>
          </span>
          <input type="text" class="form-control custom-input" placeholder="اسم المستخدم" required>
        </div>

        <!-- Password -->
         <div class="input-group mb-3 position-relative">
          <span class="input-group-text bg-transparent text-light border-0">
            <i class="fa-solid fa-eye" id="togglePassword" style="cursor: pointer;"></i>
          </span>
  <input type="password" id="password" class="form-control custom-input" placeholder="كلمة المرور" required>
    
</div>

        <div class="text-end mb-3">
          <a href="forgot.html" class="small text-info text-decoration-none">نسيت كلمة المرور؟</a>
        </div>

        <button type="submit" class="btn w-100 rounded-pill main-btn text-uppercase">تسجيل الدخول</button>
      </form>
    </div>
  </div>

<!-- Bootstrap JS -->
<script src="js/bootstrap.bundle.min.js"></script>
<!-- Font Awesome -->
<script src="js/all.min.js"></script>

<!-- Navbar collapse on mobile -->
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/all.min.js"></script>
<script src="js/script.js"></script>     
</body>
</html>
